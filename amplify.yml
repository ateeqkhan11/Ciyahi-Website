version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm install
    build:
      commands:
        - npm run build
  artifacts:
    baseDirectory: dist
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*

# Custom headers must live at the root of amplify.yml (not under `frontend:`)
# per AWS Amplify docs:
# https://docs.aws.amazon.com/amplify/latest/userguide/custom-headers.html
customHeaders:
  - pattern: '**/*'
    headers:
