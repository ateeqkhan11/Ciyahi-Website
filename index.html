      Base metadata. Per-page <SEO /> components (React 19 native head hoisting)
      override title / description / canonical / og:* / twitter:* at runtime.
      These tags are the fallback for static scrapers (LinkedIn, Slack unfurls,
      etc.) that don't execute JS.
    -->

    <meta
      name="description"
      content="Ciyahi Limited builds AI-native products and delivers outcome-driven technology services for enterprises. Founder-led. Outcome-priced. Built to last."
    />
    <link rel="canonical" href="https://ciyahi.com/" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Ciyahi Limited" />
